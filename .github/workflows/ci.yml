name: CI Pipeline (Development)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: dev  # Use development environment with dev secrets
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry'  # Enable Poetry caching based on lock file

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run Ruff linter
        run: poetry run ruff check src/

      - name: Run tests with pytest
        env:
          NEON_URI: ${{ secrets.NEON_URI }}
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DRY_RUN: true  # Run tests in dry-run mode
        run: poetry run pytest tests/ -v

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: "*.log"
          retention-days: 3
