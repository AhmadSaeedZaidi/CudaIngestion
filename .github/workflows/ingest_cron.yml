name: CUDA Kernel Ingestion Pipeline (Production)

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    environment: prod  # Use production environment with prod secrets
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pip install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install

      - name: Run ingestion pipeline
        env:
          NEON_URI: ${{ secrets.NEON_URI }}
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          BATCH_SIZE: 10
          # Set to true once to reset Neon-backed repo pagination (page + query variant).
          # RESET_GITHUB_REPO_DISCOVERY: true
        run: poetry run cuda-ingest --max-kernels 50

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-prod
          path: "*.log"
          retention-days: 7
